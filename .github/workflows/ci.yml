name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Run Ruff
        run: uv run ruff check .
      - name: Run Mypy
        run: uv run mypy .
      - name: Run Pytest
        run: uv run pytest .
