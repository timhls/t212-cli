name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Give the Action permission to write comments on Pull Requests
permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-and-test:
    name: Lint, Scan, and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up uv and Python
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Matches project version

      # 3. Install dependencies and our tools
      - name: Install Dependencies
        run: |
          uv sync

      # 4. Run Ruff (Replaces Sonar's "Code Smells" check)
      - name: Lint with Ruff
        run: |
          # Checks for bugs and bad practices
          uv run ruff check .
          # Checks for formatting issues (optional but recommended)
          uv run ruff format --check .

      # 4.5. Run Mypy (Type Checking)
      - name: Type check with Mypy
        run: uv run mypy .

      # 5. Run Bandit (Replaces Sonar's Security/SAST check)
      - name: Security Scan with Bandit
        run: |
          # Scan the src folder directly to avoid virtual environments
          uv run bandit -r src

      # 6. Run Pytest and generate coverage report
      - name: Run Pytest with Coverage
        run: |
          uv run pytest --cov=src --cov-report=xml

      # 7. Post the coverage report to the Pull Request
      - name: Post PR Coverage Comment
        # Only run this step if the workflow was triggered by a Pull Request
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./coverage.xml
          title: "Pytest Coverage Report"
          badge-title: "Coverage"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: true
