repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-added-large-files
- repo: local
  hooks:
  - id: ruff-check
    name: Ruff Lint
    entry: uv run ruff check --fix --force-exclude
    language: system
    types_or:
    - python
    - pyi
    require_serial: true
  - id: ruff-format
    name: Ruff Format
    entry: uv run ruff format --force-exclude
    language: system
    types_or:
    - python
    - pyi
    require_serial: true
  - id: mypy
    name: Mypy
    entry: uv run mypy
    language: system
    types_or:
    - python
    - pyi
    require_serial: true
  - id: bandit
    name: Bandit
    entry: uv run bandit -r src
    language: system
    types:
    - python
    require_serial: true
    pass_filenames: false
